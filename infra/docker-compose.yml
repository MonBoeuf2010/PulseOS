# PulseOS — local development stack
# Production runs on AWS (ECS/Fargate → EKS) per docs/phase-1/09-infrastructure-plan.md
version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulseos
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulseos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: pulse
      RABBITMQ_DEFAULT_PASS: pulse

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports: ["9200:9200"]
    volumes: ["osdata:/usr/share/opensearch/data"]

  api:
    build: ../backend
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
      opensearch: { condition: service_started }
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: ["../backend:/app"]

  worker:
    build: ../backend
    env_file: .env
    depends_on:
      - db
      - redis
      - rabbitmq
    command: celery -A app.workers.celery_app worker -l info -Q enrich,council,briefing,notify
    volumes: ["../backend:/app"]

  beat:
    build: ../backend
    env_file: .env
    depends_on: [redis, rabbitmq]
    command: celery -A app.workers.celery_app beat -l info
    volumes: ["../backend:/app"]

  web:
    build: ../frontend
    env_file: .env
    depends_on: [api]
    ports: ["3000:3000"]
    command: npm run dev
    volumes: ["../frontend:/app", "/app/node_modules"]

volumes:
  pgdata:
  redisdata:
  osdata:
