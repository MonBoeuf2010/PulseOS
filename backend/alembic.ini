# Alembic config for LifeIQ. The DB URL is injected from app settings in
# alembic/env.py (env-driven, 12-factor) — do NOT hard-code secrets here.
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# version_path_separator unused; versions live in alembic/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
